<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | CyberGuard</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body data-page="profile">
    <header class="site-header">
      <a class="brand" href="user.html"><span class="logo-mark">CG</span><span class="logo-text">CyberGuard</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>
      <nav class="main-nav" data-nav>
        <a class="active" href="profile.html">Profile</a>
        <a href="user.html">Home</a>
        <a href="../Index.html#about">About Us</a>
      </nav>
    </header>
    <main class="page-shell">
      <form class="form-panel" data-profile-form>
        <div class="profile-grid">
          <div>
            <div class="avatar-preview" data-avatar>CG</div>
            <p class="small-link">Change Image</p>
          </div>
          <div>
            <div class="form-grid">
              <label class="field">
                <span>First Name</span>
                <input name="firstName" type="text" placeholder="Ex. John" />
              </label>
              <label class="field">
                <span>Last Name</span>
                <input name="lastName" type="text" placeholder="Ex. Doe" />
              </label>
              <label class="field full">
                <span>Email</span>
                <input name="email" type="email" placeholder="Ex. Sample@mail.com" />
              </label>
            </div>
            <div class="badge-display" style="margin-top: 22px;" data-badges>Badge Display</div>
          </div>
        </div>
        <div class="button-row" style="margin-top: 24px;">
          <a class="btn ghost" href="user.html">Cancel</a>
          <button class="btn primary" type="submit">Save</button>
        </div>
      </form>
    </main>
    <script src="../script.js"></script>
  </body>
</html>
