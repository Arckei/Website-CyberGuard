<!doctype html>
<html lang="en">
  <head>

    <title>Join Class | CyberGuard</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body data-page="join-class">
    <header class="site-header">
      <a class="brand" href="user.html"><span class="logo-mark">CG</span><span class="logo-text">CyberGuard</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>

        <a href="profile.html">Profile</a>
        <a href="user.html">Home</a>

    <main class="auth-shell">
      <form class="form-panel auth-card" data-join-class-form>
        <p class="eyebrow">Join Class</p>
        <label class="field">
          <span>Class Code</span>
          <input name="classCode" type="text" placeholder="CG2026" required />

        <div class="button-row" style="margin-top: 24px;">
          <button class="btn primary" type="submit">Join</button>
          <a class="btn ghost" href="user.html">Cancel</a>
        </div>
      </form>
    </main>
    <script src="../script.js"></script>
