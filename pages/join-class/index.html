<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Class | CyberGuard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="join-class">
    <a class="floating-back" href="../user/" aria-label="Go back">←</a>
    <header class="site-header">
      <a class="brand" href="../user/"><span class="logo-mark">CG</span><span class="logo-text">CyberGuard</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>
      <nav class="main-nav" data-nav>
        <a href="../profile/">Profile</a>
        <a href="../user/">Home</a>
        <a href="../../index.html#about">About Us</a>
      </nav>
    </header>
    <main class="auth-shell">
      <form class="form-panel auth-card" data-join-class-form>
        <p class="eyebrow">Join Class</p>
        <div class="field glitch-field">
          <div class="glitch-input-wrapper">
            <div class="input-container">
              <input id="joinClassCode" class="holo-input" name="classCode" type="text" placeholder=" " required />
              <label for="joinClassCode" class="input-label" data-text="CLASS_CODE">CLASS_CODE</label>
              <div class="input-border"></div>
              <div class="input-scanline"></div>
              <div class="input-glow"></div>
              <div class="input-data-stream">
                <div class="stream-bar" style="--i: 0;"></div>
                <div class="stream-bar" style="--i: 1;"></div>
                <div class="stream-bar" style="--i: 2;"></div>
                <div class="stream-bar" style="--i: 3;"></div>
                <div class="stream-bar" style="--i: 4;"></div>
                <div class="stream-bar" style="--i: 5;"></div>
                <div class="stream-bar" style="--i: 6;"></div>
                <div class="stream-bar" style="--i: 7;"></div>
                <div class="stream-bar" style="--i: 8;"></div>
                <div class="stream-bar" style="--i: 9;"></div>
              </div>
              <div class="input-corners">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="button-row" style="margin-top: 24px;">
          <button class="btn primary" type="submit">Join</button>
          <a class="btn ghost" href="../user/">Cancel</a>
        </div>
      </form>
    </main>
    <script type="module" src="./script.js"></script>
  </body>
</html>
