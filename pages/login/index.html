<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | CyberGuard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="login">
    <header class="site-header">
      <a class="brand" href="../../index.html"><span class="logo-mark">CG</span><span class="logo-text">CyberGuard</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>
      <nav class="main-nav" data-nav>
        <a href="../../index.html">Home</a>
        <a href="../../index.html#about">About Us</a>
      </nav>
    </header>
    <main class="auth-shell">
      <section class="form-panel auth-card">
        <p class="eyebrow">User Login</p>
        <form data-login-form>
          <div class="auth-options" data-auth-options>
            <button class="auth-option active" type="button" data-auth-method="email">Email Login</button>
          </div>

          <div class="form-grid">
            <div class="field glitch-field">
              <div class="glitch-input-wrapper">
                <div class="input-container">
                  <input id="loginEmail" class="holo-input" name="email" type="email" placeholder=" " required />
                  <label for="loginEmail" class="input-label" data-text="EMAIL">EMAIL</label>
                  <div class="input-border"></div>
                  <div class="input-scanline"></div>
                  <div class="input-glow"></div>
                  <div class="input-data-stream">
                    <div class="stream-bar" style="--i: 0;"></div>
                    <div class="stream-bar" style="--i: 1;"></div>
                    <div class="stream-bar" style="--i: 2;"></div>
                    <div class="stream-bar" style="--i: 3;"></div>
                    <div class="stream-bar" style="--i: 4;"></div>
                    <div class="stream-bar" style="--i: 5;"></div>
                    <div class="stream-bar" style="--i: 6;"></div>
                    <div class="stream-bar" style="--i: 7;"></div>
                    <div class="stream-bar" style="--i: 8;"></div>
                    <div class="stream-bar" style="--i: 9;"></div>
                  </div>
                  <div class="input-corners">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="field glitch-field">
              <div class="glitch-input-wrapper">
                <div class="input-container">
                  <input id="loginPassword" class="holo-input" name="password" type="password" placeholder=" " required />
                  <label for="loginPassword" class="input-label" data-text="PASSWORD">PASSWORD</label>
                  <div class="input-border"></div>
                  <div class="input-scanline"></div>
                  <div class="input-glow"></div>
                  <div class="input-data-stream">
                    <div class="stream-bar" style="--i: 0;"></div>
                    <div class="stream-bar" style="--i: 1;"></div>
                    <div class="stream-bar" style="--i: 2;"></div>
                    <div class="stream-bar" style="--i: 3;"></div>
                    <div class="stream-bar" style="--i: 4;"></div>
                    <div class="stream-bar" style="--i: 5;"></div>
                    <div class="stream-bar" style="--i: 6;"></div>
                    <div class="stream-bar" style="--i: 7;"></div>
                    <div class="stream-bar" style="--i: 8;"></div>
                    <div class="stream-bar" style="--i: 9;"></div>
                  </div>
                  <div class="input-corners">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                  </div>
                </div>
              </div>
            </div>
            <label class="check-row field full">
              <input type="checkbox" data-show-password="#loginPassword" />
              <span>Show password</span>
            </label>
          </div>

          <p class="mock-note" data-mock-note>email login is active.</p>
          <p><a class="small-link" href="../signup/">Forgot password</a></p>
          <div class="button-row">
            <a class="btn ghost" href="../../index.html">Back</a>
            <button class="btn primary" type="submit">Sign In</button>
            <a class="btn ghost" href="../signup/">Sign Up</a>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="./script.js"></script>
  </body>
</html>
