<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | CyberGuard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="login">
    <header class="site-header">
      <a class="brand" href="../../index.html"><span class="logo-mark">CG</span><span class="logo-text">CyberGuard</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>
      <nav class="main-nav" data-nav>
        <a href="../../index.html">Home</a>
        <a href="../../index.html#about">About Us</a>
      </nav>
    </header>
    <main class="auth-shell">
      <section class="form-panel auth-card">
        <p class="eyebrow">User Login</p>
        <form data-login-form>
          <div class="form-grid">
            <label class="field">
              <span>Email</span>
              <input name="email" type="email" placeholder="student@mail.com" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input id="loginPassword" name="password" type="password" placeholder="Password" required />
            </label>
            <label class="field">
              <span>Role</span>
              <select name="role">
                <option value="student">Student</option>
                <option value="admin">Admin</option>
              </select>
            </label>
            <label class="check-row field full">
              <input type="checkbox" data-show-password="#loginPassword" />
              <span>Show password</span>
            </label>
          </div>
          <p><a class="small-link" href="../signup/">Forgot password</a></p>
          <div class="button-row">
            <button class="btn primary" type="submit">Sign In</button>
            <a class="btn ghost" href="../signup/">Sign Up Here</a>
          </div>
        </form>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
