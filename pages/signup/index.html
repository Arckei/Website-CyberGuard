<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | CyberGuard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="signup">
    <header class="site-header">
      <a class="brand" href="../../index.html"><span class="logo-mark">CG</span><span class="logo-text">CyberGuard</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>
      <nav class="main-nav" data-nav>
        <a href="../../index.html">Home</a>
        <a href="../../index.html#about">About Us</a>
      </nav>
    </header>
    <main class="auth-shell">
      <section class="form-panel auth-card">
        <p class="eyebrow">User Sign Up</p>
        <form data-signup-form>
          <div class="form-grid">
            <div class="field glitch-field">
              <div class="glitch-input-wrapper">
                <div class="input-container">
                  <input id="signupEmail" class="holo-input" name="email" type="email" placeholder=" " required />
                  <label for="signupEmail" class="input-label" data-text="EMAIL">EMAIL</label>
                  <div class="input-border"></div>
                  <div class="input-scanline"></div>
                  <div class="input-glow"></div>
                  <div class="input-data-stream">
                    <div class="stream-bar" style="--i: 0;"></div>
                    <div class="stream-bar" style="--i: 1;"></div>
                    <div class="stream-bar" style="--i: 2;"></div>
                    <div class="stream-bar" style="--i: 3;"></div>
                    <div class="stream-bar" style="--i: 4;"></div>
                    <div class="stream-bar" style="--i: 5;"></div>
                    <div class="stream-bar" style="--i: 6;"></div>
                    <div class="stream-bar" style="--i: 7;"></div>
                    <div class="stream-bar" style="--i: 8;"></div>
                    <div class="stream-bar" style="--i: 9;"></div>
                  </div>
                  <div class="input-corners">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="field glitch-field">
              <div class="glitch-input-wrapper">
                <div class="input-container">
                  <input id="signupFirstName" class="holo-input" name="firstName" type="text" placeholder=" " required />
                  <label for="signupFirstName" class="input-label" data-text="FIRST_NAME">FIRST_NAME</label>
                  <div class="input-border"></div>
                  <div class="input-scanline"></div>
                  <div class="input-glow"></div>
                  <div class="input-data-stream">
                    <div class="stream-bar" style="--i: 0;"></div>
                    <div class="stream-bar" style="--i: 1;"></div>
                    <div class="stream-bar" style="--i: 2;"></div>
                    <div class="stream-bar" style="--i: 3;"></div>
                    <div class="stream-bar" style="--i: 4;"></div>
                    <div class="stream-bar" style="--i: 5;"></div>
                    <div class="stream-bar" style="--i: 6;"></div>
                    <div class="stream-bar" style="--i: 7;"></div>
                    <div class="stream-bar" style="--i: 8;"></div>
                    <div class="stream-bar" style="--i: 9;"></div>
                  </div>
                  <div class="input-corners">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="field glitch-field">
              <div class="glitch-input-wrapper">
                <div class="input-container">
                  <input id="signupLastName" class="holo-input" name="lastName" type="text" placeholder=" " required />
                  <label for="signupLastName" class="input-label" data-text="LAST_NAME">LAST_NAME</label>
                  <div class="input-border"></div>
                  <div class="input-scanline"></div>
                  <div class="input-glow"></div>
                  <div class="input-data-stream">
                    <div class="stream-bar" style="--i: 0;"></div>
                    <div class="stream-bar" style="--i: 1;"></div>
                    <div class="stream-bar" style="--i: 2;"></div>
                    <div class="stream-bar" style="--i: 3;"></div>
                    <div class="stream-bar" style="--i: 4;"></div>
                    <div class="stream-bar" style="--i: 5;"></div>
                    <div class="stream-bar" style="--i: 6;"></div>
                    <div class="stream-bar" style="--i: 7;"></div>
                    <div class="stream-bar" style="--i: 8;"></div>
                    <div class="stream-bar" style="--i: 9;"></div>
                  </div>
                  <div class="input-corners">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="field glitch-field">
              <div class="glitch-input-wrapper">
                <div class="input-container">
                  <input id="signupPassword" class="holo-input" name="password" type="password" placeholder=" " required />
                  <label for="signupPassword" class="input-label" data-text="PASSWORD">PASSWORD</label>
                  <div class="input-border"></div>
                  <div class="input-scanline"></div>
                  <div class="input-glow"></div>
                  <div class="input-data-stream">
                    <div class="stream-bar" style="--i: 0;"></div>
                    <div class="stream-bar" style="--i: 1;"></div>
                    <div class="stream-bar" style="--i: 2;"></div>
                    <div class="stream-bar" style="--i: 3;"></div>
                    <div class="stream-bar" style="--i: 4;"></div>
                    <div class="stream-bar" style="--i: 5;"></div>
                    <div class="stream-bar" style="--i: 6;"></div>
                    <div class="stream-bar" style="--i: 7;"></div>
                    <div class="stream-bar" style="--i: 8;"></div>
                    <div class="stream-bar" style="--i: 9;"></div>
                  </div>
                  <div class="input-corners">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                  </div>
                </div>
              </div>
            </div>
            <label class="check-row">
              <input type="checkbox" data-show-password="#signupPassword" />
              <span>Show password</span>
            </label>
          </div>
          <div class="button-row">
            <a class="btn ghost" href="../login/">Back</a>
            <button class="btn primary" type="submit">Sign Up</button>
          </div>
          <p><a class="small-link" href="../login/">Already have an account? Sign In</a></p>
        </form>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
