<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | CyberGuard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="profile">
    <header class="site-header">
      <a class="brand" href="../user/"><span class="logo-mark">CG</span><span class="logo-text">CyberGuard</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" data-nav-toggle><span></span><span></span><span></span></button>
      <nav class="main-nav" data-nav>
        <a class="active" href="../profile/">Profile</a>
        <a href="../user/">Home</a>
        <a href="../../index.html#about">About Us</a>
      </nav>
    </header>
    <main class="page-shell">
      <form class="form-panel" data-profile-form>
        <div class="profile-grid">
          <div>
            <div class="avatar-preview" data-avatar>CG</div>
            <p class="small-link">Change Image</p>
          </div>
          <div>
            <div class="form-grid">
              <label class="field">
                <span>First Name</span>
                <input name="firstName" type="text" placeholder="Ex. John" />
              </label>
              <label class="field">
                <span>Last Name</span>
                <input name="lastName" type="text" placeholder="Ex. Doe" />
              </label>
              <label class="field full">
                <span>Email</span>
                <input name="email" type="email" placeholder="Ex. Sample@mail.com" />
              </label>
            </div>
            <div class="badge-display" style="margin-top: 22px;" data-badges>Badge Display</div>
          </div>
        </div>

        <div class="settings-card" style="margin-top: 24px;">
          <div class="settings-header">
            <h2>Settings</h2>
            <p>Customize your study space and keep your account secure.</p>
          </div>

          <div class="settings-grid">
            <label class="setting-item">
              <span>Dark mode</span>
              <label class="switch">
                <input type="checkbox" name="darkMode" data-setting-toggle="darkMode" />
                <span class="slider"></span>
              </label>
            </label>
            <label class="setting-item">
              <span>Show hints during modules</span>
              <label class="switch">
                <input type="checkbox" name="showHints" data-setting-toggle="showHints" />
                <span class="slider"></span>
              </label>
            </label>
            <label class="setting-item">
              <span>Reminder prompts</span>
              <label class="switch">
                <input type="checkbox" name="reminderPrompts" data-setting-toggle="reminderPrompts" />
                <span class="slider"></span>
              </label>
            </label>
            <label class="setting-item">
              <span>Focus mode</span>
              <label class="switch">
                <input type="checkbox" name="focusMode" data-setting-toggle="focusMode" />
                <span class="slider"></span>
              </label>
            </label>
          </div>
        </div>

        <div class="button-row" style="margin-top: 24px;">
          <a class="btn ghost" href="../user/">Cancel</a>
          <button class="btn primary" type="submit">Save</button>
        </div>
      </form>

      <div class="side-actions">
        <button class="btn ghost" type="button" data-logout-btn>Log Out</button>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
